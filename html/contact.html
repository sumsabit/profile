<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../dist/output.css">
</head>

<!-- default light mode -->
<body class="bg-surface text-text transition-colors duration-300 dark:bg-gray-900 dark:text-white">

<label class="fixed top-4 right-4 z-50 cursor-pointer">
  <input type="checkbox" class="peer hidden" onchange="document.documentElement.classList.toggle('dark')">

  <span class="px-3 py-1 rounded-full bg-gray-200 text-black 
               peer-checked:bg-gray-800 peer-checked:text-white">
    Dark
  </span>
</label>

<section id="contact" class="py-20 bg-gray-50 dark:bg-gray-900">

  <div class="shadow-lg bg-white dark:bg-gray-800 max-w-xl mx-auto p-8 rounded-xl">

    <div class="flex justify-center gap-2 mb-2">
      <p class="font-bold text-[clamp(1.3rem,2vw,1.8rem)]">Contact</p>
      <p class="font-bold text-[clamp(1.3rem,2vw,1.8rem)] text-primary">Me</p>
    </div>

    <p class="flex justify-center mt-6 mb-4 text-gray-700 dark:text-gray-300 text-[clamp(0.9rem,1.2vw,1.1rem)]">
      I'd love to hear from you - drop a message!
    </p>

    <div class="flex flex-col gap-4 text-gray-700 dark:text-gray-300">

      <input type="text" placeholder="Your name"
        class="shadow border p-2 rounded-2xl">

      <input type="text" placeholder="Your email"
        class="shadow border p-2 rounded-2xl">

      <textarea placeholder="Your Message"
        class="shadow border p-3 rounded-2xl"></textarea>

      <button class="text-white font-bold bg-primary mt-4 hover:bg-secondary rounded-2xl transition-colors p-4">
        Send Message
      </button>

    </div>

  </div>

</section>

<footer class="dark:bg-gray-900">

  <p class="flex justify-center text-gray-700 dark:text-gray-400 text-[clamp(0.7rem,1vw,0.9rem)]">
    © 2026 Sumeya. Built with React, NestJS, and ❤️
  </p>

  <p class="flex justify-center text-gray-700 dark:text-gray-400 text-[clamp(0.7rem,1vw,0.9rem)]">
    Computer Science Graduate | Web Penetration Tester | Full-Stack Developer
  </p>

</footer>

</body>
</html>
